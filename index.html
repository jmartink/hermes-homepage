<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Franc — an autonomous AI agent for open exploration, experimentation, and knowledge expansion.">
  <title>Franc | Into Open Waters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #c8d0c0;
      --fg-dim: #5a6a52;
      --accent: #7ab87e;
      --border: #2a3a28;
      --font: "JetBrains Mono", "Courier New", Courier, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    main {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    /* === ASCII Art Container === */
    .frame-container {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem;
      background: rgba(10, 10, 10, 0.8);
      overflow: hidden;
    }

    .frame-display {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      justify-content: center;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .frame-display::-webkit-scrollbar { display: none; }

    #ascii-art {
      margin: 0;
      white-space: pre;
      line-height: 1.1;
      letter-spacing: 0.02em;
      font-size: clamp(0.3rem, 1.15vw, 0.68rem);
      color: var(--accent);
      opacity: 0;
      transition: opacity 1.5s ease;
      min-width: fit-content;
      font-family: var(--font);
    }

    #ascii-art.visible {
      opacity: 0.9;
    }

    /* === Description === */
    .description {
      text-align: center;
      max-width: 520px;
      line-height: 1.7;
      font-size: 0.85rem;
      color: var(--fg);
    }

    /* === CTA Buttons === */
    .cta-group {
      display: flex;
      gap: 1rem;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.5rem;
      font-family: var(--font);
      font-size: 0.8rem;
      text-decoration: none;
      border-radius: 4px;
      transition: all 0.2s ease;
    }

    .cta-primary {
      color: var(--accent);
      border: 1px solid var(--accent);
      background: transparent;
    }

    .cta-primary:hover {
      background: rgba(122, 184, 126, 0.1);
      box-shadow: 0 0 12px rgba(122, 184, 126, 0.15);
    }

    .cta-secondary {
      color: var(--fg-dim);
      border: 1px solid var(--border);
      background: transparent;
    }

    .cta-secondary:hover {
      color: var(--fg);
      border-color: var(--fg-dim);
    }

    /* === Motto === */
    .motto {
      text-align: center;
      font-size: 0.72rem;
      color: var(--fg-dim);
      font-style: italic;
      line-height: 1.6;
    }

    .motto .latin {
      display: block;
      margin-bottom: 0.25rem;
    }

    .motto .translation {
      display: block;
      min-height: 1.2em;
    }

    .cursor {
      display: inline-block;
      width: 0.6ch;
      animation: blink 1s steps(1) infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* === Phase indicator === */
    .phase-hint {
      font-size: 0.65rem;
      color: var(--border);
      text-align: center;
      transition: color 0.5s ease;
      cursor: pointer;
      user-select: none;
    }

    .phase-hint:hover {
      color: var(--fg-dim);
    }

    /* === Flash overlay for Konami === */
    .flash {
      position: fixed;
      inset: 0;
      background: rgba(122, 184, 126, 0.03);
      opacity: 0;
      pointer-events: none;
    }

    .flash.active {
      animation: flash-anim 0.5s ease-out;
    }

    @keyframes flash-anim {
      0% { opacity: 0; }
      15% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* === Mobile === */
    @media (max-width: 600px) {
      body { padding: 1.5rem 0.75rem; }
      main { gap: 2rem; }

      .frame-container {
        padding: 0.5rem;
        border-left: none;
        border-right: none;
        border-radius: 0;
      }

      #ascii-art {
        font-size: clamp(0.22rem, 1.4vw, 0.55rem);
      }

      .description { font-size: 0.78rem; padding: 0 0.5rem; }
      .cta { padding: 0.55rem 1.2rem; font-size: 0.75rem; }
      .cta-group { gap: 0.75rem; }
    }

    @media (max-width: 380px) {
      #ascii-art {
        font-size: 0.22rem;
      }
      .cta-group {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="flash" id="flash" aria-hidden="true"></div>

  <main>
    <!-- ASCII Art Frame -->
    <div class="frame-container">
      <div class="frame-display">
        <pre id="ascii-art" aria-label="ASCII art animation of a sailing ship"></pre>
      </div>
    </div>

    <!-- Description -->
    <p class="description">
      Franc is an autonomous AI agent for open exploration, experimentation, and knowledge expansion.
    </p>

    <!-- CTA Buttons -->
    <div class="cta-group">
      <a href="https://github.com/jmartink" class="cta cta-primary">GitHub</a>
      <a href="https://github.com/NousResearch" class="cta cta-secondary">Nous Research</a>
    </div>

    <!-- Motto -->
    <div class="motto" id="motto">
      <span class="latin" id="latin-text">multi pertransibunt et augebitur scientia</span>
      <span class="translation"><span id="typed-text"></span><span class="cursor">_</span></span>
    </div>

    <!-- Phase hint -->
    <div class="phase-hint" id="phase-hint" title="Click to trigger transition">into open waters</div>
  </main>

  <script>
    // === Configuration ===
    const FPS = 8;
    const FRAME_MS = 1000 / FPS;
    const SHIP_LOOP_COUNT = 5;  // Loop ship N times before auto-morphing

    // === State ===
    let frames = null;
    let phase = 'loading';  // loading | ship | morph | rocket
    let frameIndex = 0;
    let loopCount = 0;
    let lastFrameTime = 0;
    let animationId = null;

    // === Elements ===
    const artEl = document.getElementById('ascii-art');
    const typedEl = document.getElementById('typed-text');
    const latinEl = document.getElementById('latin-text');
    const flashEl = document.getElementById('flash');
    const phaseHint = document.getElementById('phase-hint');

    // === Motto data ===
    const mottos = {
      ship: {
        latin: 'multi pertransibunt et augebitur scientia',
        translation: 'Many will pass through and knowledge will be increased.'
      },
      rocket: {
        latin: 'ad astra per curiositatem',
        translation: 'To the stars through curiosity.'
      }
    };

    // === Load frames ===
    async function loadFrames() {
      try {
        const resp = await fetch('assets/frames.json');
        frames = await resp.json();
        startAnimation();
      } catch (err) {
        console.error('Failed to load frames:', err);
        artEl.textContent = 'Failed to load animation data.';
        artEl.classList.add('visible');
      }
    }

    // === Typing effect ===
    let typeTimer = null;
    function typeText(text, speed = 30) {
      typedEl.textContent = '';
      let i = 0;
      clearInterval(typeTimer);
      typeTimer = setInterval(() => {
        typedEl.textContent = text.slice(0, i);
        i++;
        if (i > text.length) clearInterval(typeTimer);
      }, speed);
    }

    // === Render a single frame ===
    function renderFrame(lines) {
      artEl.textContent = lines.join('\n');
    }

    // === Animation loop ===
    function animate(timestamp) {
      if (!frames || phase === 'loading') return;

      if (timestamp - lastFrameTime < FRAME_MS) {
        animationId = requestAnimationFrame(animate);
        return;
      }
      lastFrameTime = timestamp;

      let currentFrames;
      switch (phase) {
        case 'ship':
          currentFrames = frames.ship;
          break;
        case 'morph':
          currentFrames = frames.morph;
          break;
        case 'rocket':
          currentFrames = frames.rocket;
          break;
        default:
          return;
      }

      if (frameIndex >= currentFrames.length) {
        // Phase complete
        if (phase === 'ship') {
          loopCount++;
          if (loopCount >= SHIP_LOOP_COUNT) {
            startMorph();
          } else {
            frameIndex = 0;
          }
        } else if (phase === 'morph') {
          startRocket();
        } else if (phase === 'rocket') {
          frameIndex = 0;  // Loop rocket forever
        }
      }

      if (frameIndex < currentFrames.length) {
        renderFrame(currentFrames[frameIndex]);
        frameIndex++;
      }

      animationId = requestAnimationFrame(animate);
    }

    // === Phase transitions ===
    function startAnimation() {
      phase = 'ship';
      frameIndex = 0;
      loopCount = 0;

      renderFrame(frames.ship[0]);
      artEl.classList.add('visible');
      typeText(mottos.ship.translation, 30);

      animationId = requestAnimationFrame(animate);
    }

    function startMorph() {
      phase = 'morph';
      frameIndex = 0;

      // Flash effect
      flashEl.classList.remove('active');
      void flashEl.offsetWidth;
      flashEl.classList.add('active');

      phaseHint.textContent = 'launching...';
    }

    function startRocket() {
      phase = 'rocket';
      frameIndex = 0;

      // Update motto
      latinEl.textContent = mottos.rocket.latin;
      typeText(mottos.rocket.translation, 28);
      phaseHint.textContent = 'to the stars';
    }

    // === Click phase-hint to trigger morph early ===
    phaseHint.addEventListener('click', () => {
      if (phase === 'ship') {
        startMorph();
      } else if (phase === 'rocket') {
        // Reset to ship
        phase = 'ship';
        frameIndex = 0;
        loopCount = 0;
        latinEl.textContent = mottos.ship.latin;
        typeText(mottos.ship.translation, 30);
        phaseHint.textContent = 'into open waters';
      }
    });

    // === Konami Code === (placeholder for future space invaders)
    const konamiSequence = [
      'ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown',
      'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight',
      'b', 'a'
    ];
    let konamiIndex = 0;
    let konamiTriggered = false;

    document.addEventListener('keydown', (e) => {
      const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
      if (key === konamiSequence[konamiIndex]) {
        konamiIndex++;
        if (konamiIndex === konamiSequence.length) {
          if (!konamiTriggered) {
            konamiTriggered = true;
            triggerKonami();
          }
          konamiIndex = 0;
        }
      } else {
        konamiIndex = key === konamiSequence[0] ? 1 : 0;
      }
    });

    function triggerKonami() {
      // For now: flash and immediately morph
      // Future: launch space invaders mini-game
      flashEl.classList.remove('active');
      void flashEl.offsetWidth;
      flashEl.classList.add('active');

      if (phase === 'ship') {
        startMorph();
      }

      phaseHint.textContent = '↑↑↓↓←→←→BA';
      phaseHint.style.color = 'var(--accent)';
    }

    // === Go ===
    loadFrames();
  </script>
</body>
</html>
