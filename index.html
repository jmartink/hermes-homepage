<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Franc is an autonomous AI agent for open exploration, experimentation, and knowledge expansion.">
  <title>Franc | Into Open Waters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --art: #7ab87e;
      --art-kicker: #8eb98a;
      --motto: #5a7a5e;
      --footer: #3a5a3e;
      --flash: rgba(255, 255, 255, 0.05);
      --ascii-size: clamp(0.28rem, 0.95vw, 0.72rem);
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "JetBrains Mono", "Courier New", Courier, monospace;
      background: var(--bg);
      color: var(--art);
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 1.25rem;
    }

    .hero {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
      flex: 1;
    }

    .media-video {
      display: block;
      width: min(100%, 720px);
      max-width: 720px;
      height: auto;
      background: #000;
    }

    .art-block {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      transform: translateY(1rem);
      transition: opacity 2s ease, transform 2s ease;
    }

    .art-block.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .ascii-wrap {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      justify-content: center;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .ascii-wrap::-webkit-scrollbar {
      display: none;
    }

    .ascii-art {
      margin: 0;
      padding: 0;
      white-space: pre;
      line-height: 1.04;
      letter-spacing: 0.01em;
      font-size: var(--ascii-size);
      color: var(--art);
      opacity: 0.85;
      min-width: fit-content;
      transition: opacity 0.35s ease, color 0.35s ease;
    }

    .ascii-art:hover {
      opacity: 1;
    }

    .motto-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      text-align: center;
    }

    .motto {
      color: var(--motto);
      font-style: italic;
      font-size: 0.85rem;
      line-height: 1.5;
      letter-spacing: 0.01em;
    }

    .typing-line {
      min-height: 1.3rem;
      color: var(--motto);
      font-style: italic;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .cursor {
      display: inline-block;
      width: 0.64ch;
      margin-left: 0.08ch;
      animation: blink 0.95s steps(1, end) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    footer {
      width: 100%;
      margin-top: 4rem;
      text-align: center;
      color: var(--footer);
      font-size: 0.7rem;
      line-height: 1.4;
    }

    .flash {
      position: fixed;
      inset: 0;
      background: var(--flash);
      opacity: 0;
      pointer-events: none;
    }

    .flash.active {
      animation: flash 0.4s ease-out;
    }

    @keyframes flash {
      0% {
        opacity: 0;
      }
      18% {
        opacity: 1;
      }
      100% {
        opacity: 0;
      }
    }

    body.konami .ascii-art {
      color: var(--art-kicker);
      opacity: 0.96;
    }

    body.konami .motto,
    body.konami .typing-line {
      color: #6f8565;
    }

    @media (max-width: 720px) {
      .page {
        padding: 1.25rem 0.75rem 1rem;
      }

      .hero {
        gap: 2.25rem;
      }

      .media-video {
        width: 100%;
      }

      .ascii-art {
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <div class="flash" id="flash" aria-hidden="true"></div>

  <main class="page">
    <section class="hero">
      <video class="media-video" autoplay muted playsinline preload="auto">
        <source src="assets/franc_intro.mp4" type="video/mp4">
      </video>

      <section class="art-block" id="art-block" aria-label="Franc landing art">
        <div class="ascii-wrap">
          <pre class="ascii-art" id="hero-art" aria-label="ASCII art of a galleon between pillars"></pre>
        </div>

        <div class="motto-group">
          <div class="motto" id="motto">Multi pertransibunt et augebitur scientia</div>
          <div class="typing-line"><span id="typed-text"></span><span class="cursor">_</span></div>
        </div>
      </section>
    </section>

    <footer>Into open waters</footer>
  </main>

  <script>
    const initialMotto = "Multi pertransibunt et augebitur scientia";
    const initialTranslation = "Many will pass through and knowledge will be increased.";
    const altMotto = "Ad astra per curiositatem";
    const altTranslation = "To the stars through curiosity.";

    const artLines = [

      " \u2551             / / / /|     |     |\\ \\ \\ \\                   \u2551          ",
      " \u2551            / /_/ / |     |     | \\ \\_\\ \\                  \u2551          ",

      " \u2551         |  _____________________________  |               \u2551          ",
      " \u2551         | |  [] [] [] F R A N C [] []  | |               \u2551           ",
      " \u2551         | |___________________________| |                \u2551           ",
      " \u2551          \\___/                    \\___/                   \u2551          ",
      " \u2551     ~ ~   \\_________________________/   ~ ~              \u2551           ",
      " \u2551   ~   ~  ~  ~ ~ ~ ~  ~ ~  ~ ~ ~ ~  ~ ~  ~   ~          \u2551             ",
      " \u2551 ~  ~  ~ ~ ~  ~ ~ ~  ~ ~ ~  ~ ~ ~ ~ ~  ~ ~ ~  ~         \u2551             ",
      " \u2551   ~  ~  ~ ~ ~  ~  ~ ~  ~ ~ ~  ~  ~ ~ ~ ~  ~  ~         \u2551             ",
      " \u2551  ~ ~  ~ ~ ~  ~ ~ ~  ~ ~ ~  ~ ~ ~ ~ ~  ~ ~ ~  ~         \u2551             ",
      " \u2551 ~  ~  ~  ~  ~ ~  ~ ~  ~  ~ ~ ~  ~ ~  ~ ~  ~  ~ ~       \u2551             ",
      " \u2560\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2563          ",
      " \u2551 \u2591\u2591\u2591\u2591\u2592\u2592\u2591\u2591\u2591\u2591  \u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557  \u2591\u2591\u2591\u2591\u2592\u2592\u2591\u2591\u2591\u2591       \u2551            ",
      " \u2551 \u2591\u2591\u2591\u2591\u2592\u2592\u2591\u2591\u2591\u2591  \u2551   .: A N N O :.      \u2551  \u2591\u2591\u2591\u2591\u2592\u2592\u2591\u2591\u2591\u2591       \u2551             ",
      " \u2551 \u2591\u2591\u2591\u2591\u2592\u2592\u2591\u2591\u2591\u2591  \u2551      M D C X X       \u2551  \u2591\u2591\u2591\u2591\u2592\u2592\u2591\u2591\u2591\u2591       \u2551             ",
      " \u2551 \u2591\u2591\u2591\u2591\u2592\u2592\u2591\u2591\u2591\u2591  \u255a\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255d  \u2591\u2591\u2591\u2591\u2592\u2592\u2591\u2591\u2591\u2591       \u2551            ",
      " \u255a\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255d        "
    ];

    const rocketLines = [
      "   *    .    *       .   *        . *   .     *    .   *   .  *         ",
      "      .        *  .      .    *       .   *       .        .            ",
      "  .       *        .  *      .     *     .    *        .     *          ",
      " [|]                        /\\                               [|]        ",
      " [|]                       /  \\                              [|]        ",
      " [|]                      / /\\ \\                             [|]        ",
      " [|]                     / /  \\ \\                            [|]        ",
      " [|]                    / / () \\ \\                           [|]        ",
      " [|]                   | |      | |                          [|]        ",
      " [|]                   | | FRNC | |                          [|]        ",
      " [|]                   | |      | |                          [|]        ",
      " [|]                   | |______| |                          [|]        ",
      " [|]                  /| |::::::| |\\                         [|]        ",
      " [|]                 /_|_|______|_|_\\                        [|]        ",
      " [|]                |  |  FRANC  |  |                        [|]        ",
      " [|]                |__|________|__|                         [|]        ",
      " [|]               /  / |      | \\  \\                       [|]         ",
      " [|]              /__/  |      |  \\__\\                      [|]         ",
      " [|]                  .^|^^^^^^|^.                           [|]        ",
      " [|]                .^^^|^^^^^^|^^^.                         [|]        ",
      " [|]              .^^^^^|^^^^^^|^^^^^.                       [|]        ",
      " [|]            .^^^^^^^|^^^^^^|^^^^^^^.                     [|]        ",
      " [|]           ^^^^^^^^^|^^^^^^|^^^^^^^^^                    [|]        ",
      " [|]          ^^^^^^^^^^|^^^^^^|^^^^^^^^^^                   [|]        ",
      " [\\]==========/^^^^^^^^^^^^^^^^^^^^^^^^\\===========/[/]     [|]         ",
      " [|] \u2593\u2593\u2593\u2593\u2592\u2592\u2593\u2593  \u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557  \u2593\u2593\u2592\u2592\u2593\u2593\u2593\u2593        [|]           ",
      " [|] \u2593\u2593\u2593\u2593\u2592\u2592\u2593\u2593  \u2551  .: L A U N C H :.   \u2551  \u2593\u2593\u2592\u2592\u2593\u2593\u2593\u2593        [|]            ",
      " [|] \u2593\u2593\u2593\u2593\u2592\u2592\u2593\u2593  \u2551    S E Q U E N C E    \u2551  \u2593\u2593\u2592\u2592\u2593\u2593\u2593\u2593        [|]           ",
      " [|] \u2593\u2593\u2593\u2593\u2592\u2592\u2593\u2593  \u255a\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255d  \u2593\u2593\u2592\u2592\u2593\u2593\u2593\u2593        [|]           ",
      " [=]================================================================[=] "
    ];

    const heroArt = document.getElementById("hero-art");
    const typedText = document.getElementById("typed-text");
    const motto = document.getElementById("motto");
    const flash = document.getElementById("flash");
    const artBlock = document.getElementById("art-block");
    const charsetBase = "01ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓ#$%&*+.";
    let matrixExtra = "";
    let audioContext;
    let konamiTriggered = false;

    function normalizeLines(lines) {
      const width = Math.max(...lines.map((line) => line.length));
      return lines.map((line) => line.padEnd(width, " "));
    }

    const startArt = normalizeLines(artLines);
    const endArt = normalizeLines(rocketLines);

    function typeText(text, speed = 32) {
      typedText.textContent = "";
      let index = 0;
      clearInterval(typeText.timer);
      typeText.timer = setInterval(() => {
        typedText.textContent = text.slice(0, index);
        index += 1;
        if (index > text.length) {
          clearInterval(typeText.timer);
        }
      }, speed);
    }

    function randomChar() {
      const chars = charsetBase + matrixExtra;
      return chars[Math.floor(Math.random() * chars.length)];
    }

    function renderArt(lines) {
      heroArt.textContent = lines.join("\n");
    }

    function morphArt(fromLines, toLines, duration = 2000) {
      const fromText = fromLines.join("\n");
      const toText = toLines.join("\n");
      const total = Math.max(fromText.length, toText.length);
      const fromChars = fromText.padEnd(total, " ").split("");
      const toChars = toText.padEnd(total, " ").split("");
      const revealTimes = Array.from({ length: total }, () => Math.random() * duration * 0.78);
      const start = performance.now();

      function frame(now) {
        const elapsed = now - start;
        const output = new Array(total);

        for (let i = 0; i < total; i += 1) {
          if (toChars[i] === "\n") {
            output[i] = "\n";
          } else if (elapsed >= revealTimes[i]) {
            output[i] = toChars[i];
          } else if (Math.random() > 0.55) {
            output[i] = randomChar();
          } else {
            output[i] = fromChars[i];
          }
        }

        heroArt.textContent = output.join("");

        if (elapsed < duration) {
          requestAnimationFrame(frame);
        } else {
          renderArt(toLines);
        }
      }

      requestAnimationFrame(frame);
    }

    function ensureAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
      return audioContext;
    }

    function playBeep() {
      const ctx = ensureAudio();
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(880, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.018, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.09);
    }

    function playChord() {
      const ctx = ensureAudio();
      const now = ctx.currentTime;
      const freqs = [220, 277.18, 329.63];

      freqs.forEach((freq, index) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = index === 1 ? "triangle" : "sine";
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.05, now + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.55);
      });
    }

    document.addEventListener("click", () => {
      playBeep();
    });

    function triggerKonami() {
      if (konamiTriggered) return;
      konamiTriggered = true;
      document.body.classList.add("konami");
      flash.classList.remove("active");
      void flash.offsetWidth;
      flash.classList.add("active");
      matrixExtra = "🚀✨";
      playChord();
      motto.textContent = altMotto;
      typeText(altTranslation, 34);
      morphArt(startArt, endArt, 2000);
      setTimeout(() => {
        matrixExtra = "";
      }, 2200);
    }

    const konami = ["ArrowUp", "ArrowUp", "ArrowDown", "ArrowDown", "ArrowLeft", "ArrowRight", "ArrowLeft", "ArrowRight", "b", "a"];
    let konamiIndex = 0;

    document.addEventListener("keydown", (event) => {
      const key = event.key.length === 1 ? event.key.toLowerCase() : event.key;
      if (key === konami[konamiIndex]) {
        konamiIndex += 1;
        if (konamiIndex === konami.length) {
          triggerKonami();
          konamiIndex = 0;
        }
      } else {
        konamiIndex = key === konami[0] ? 1 : 0;
      }
    });

    function revealArt() {
      artBlock.classList.add("visible");
    }

    renderArt(startArt);
    typeText(initialTranslation, 32);

    if ("IntersectionObserver" in window) {
      const artObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            revealArt();
            artObserver.disconnect();
          }
        });
      }, {
        threshold: 0.2
      });

      artObserver.observe(artBlock);
    }

    window.addEventListener("load", () => {
      setTimeout(revealArt, 120);
    }, { once: true });
  </script>
</body>
</html>
